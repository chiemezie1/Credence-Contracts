name: WASM Size Budget

on:
  push:
    branches:
      - main
      - master
      - develop
      - ci/**
      - fix/**
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm-size:
    name: Release WASM size gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release WASM (deployable contracts)
        run: |
          cargo build --target wasm32-unknown-unknown --release --locked \
            -p admin \
            -p credence_arbitration \
            -p credence_bond \
            -p credence_delegation \
            -p credence_multisig \
            -p credence_treasury \
            -p templates \
            -p timelock

      - name: Enforce per-contract WASM size budgets
        run: bash scripts/check_wasm_size.sh
